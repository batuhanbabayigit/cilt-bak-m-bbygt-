<section id="contact">
  <h2>İletişim</h2>
  <p>Bize ulaşmak için aşağıdaki formu doldurabilirsiniz:</p>

  <form id="contact-form">
    <label for="name">Adınız:</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="email">E-posta:</label><br>
    <input type="email" id="email" name="email" required><br><br>

    <label for="message">Mesajınız:</label><br>
    <textarea id="message" name="message" rows="4" required></textarea><br><br>

    <button type="submit">Gönder</button>
  </form>

  <p>Alternatif olarak bize şu kanallardan ulaşabilirsiniz:</p>
  <ul>
    <li>E-posta: info@ornek.com</li>
    <li>Telefon: +90 555 123 45 67</li>
    <li>Adres: Kırşehir, Türkiye</li>
  </ul>
</section>
