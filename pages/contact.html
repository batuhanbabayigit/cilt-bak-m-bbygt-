<section id="contact" class="section contact">
  <div class="container">
    <div class="section-title">
      <h2>Bize Ulaşın</h2>
      <div class="underline"></div>
      <p>Ürünlerimiz hakkında sorularınız mı var? Size yardımcı olmaktan mutluluk duyarız.</p>
    </div>

    <div class="contact-wrapper">
      <div class="contact-info-card">
        <h3>İletişim Bilgileri</h3>
        <div class="info-details">
          <div class="info-item">
            <i class="fas fa-map-marker-alt"></i>
            <div>
              <span>Adres</span>
              <p>Nişantaşı, Valikonağı Cad. No:10, İstanbul</p>
            </div>
          </div>
          <div class="info-item">
            <i class="fas fa-phone-alt"></i>
            <div>
              <span>Telefon</span>
              <p>+90 212 555 00 00</p>
            </div>
          </div>
          <div class="info-item">
            <i class="fas fa-envelope"></i>
            <div>
              <span>E-posta</span>
              <p>destek@lumina.com</p>
            </div>
          </div>
        </div>
        <div class="contact-socials">
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-pinterest"></i></a>
          <a href="#"><i class="fab fa-facebook-f"></i></a>
        </div>
      </div>

      <div class="contact-form-card">
        <form id="contact-form">
          <div class="form-group">
            <input type="text" id="name" placeholder="Adınız Soyadınız" required>
          </div>
          <div class="form-group">
            <input type="email" id="email" placeholder="E-posta Adresiniz" required>
          </div>
          <div class="form-group">
            <select id="subject">
              <option value="bilgi">Bilgi Almak İstiyorum</option>
              <option value="siparis">Sipariş Durumu</option>
              <option value="isbirligi">İş Birliği</option>
            </select>
          </div>
          <div class="form-group">
            <textarea id="message" rows="5" placeholder="Mesajınız..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Mesajı Gönder</button>
        </form>
      </div>
    </div>
  </div>
</section>
