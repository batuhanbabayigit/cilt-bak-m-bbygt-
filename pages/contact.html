<section id="contact" class="contact-section">
    <div class="container">
        <div class="contact-header">
            <h2>Bizimle İletişime Geçin</h2>
            <p>Sorularınız, iş birliği teklifleriniz veya sadece merhaba demek için bize yazabilirsiniz.</p>
        </div>

        <div class="contact-container">
            <div class="contact-info">
                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div>
                        <h4>Adres</h4>
                        <p>Teşvikiye Mah. Valikonağı Cad. No:12, Şişli/İstanbul</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-phone-alt"></i>
                    <div>
                        <h4>Telefon</h4>
                        <p>+90 (212) 555 00 00</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-envelope"></i>
                    <div>
                        <h4>E-posta</h4>
                        <p>destek@luminacare.com</p>
                    </div>
                </div>

                <div class="social-links">
                    <a href="#"><i class="fab fa-instagram"></i></a>
                    <a href="#"><i class="fab fa-twitter"></i></a>
                    <a href="#"><i class="fab fa-pinterest"></i></a>
                </div>
            </div>

            <div class="contact-form-wrapper">
                <form id="contact-form" class="main-form">
                    <div class="input-group">
                        <input type="text" id="name" name="name" placeholder="Adınız Soyadınız" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="email" name="email" placeholder="E-posta Adresiniz" required>
                    </div>
                    <div class="input-group">
                        <select name="subject" id="subject">
                            <option value="genel">Genel Soru</option>
                            <option value="siparis">Sipariş Hakkında</option>
                            <option value="isbirligi">İş Birliği</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <textarea id="message" name="message" rows="5" placeholder="Mesajınız..." required></textarea>
                    </div>
                    <button type="submit" class="btn-send">Mesaj Gönder</button>
                </form>
            </div>
        </div>
    </div>
</section>
