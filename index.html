<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hamburger Menü Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container nav-container">
      <div class="logo">LUMINA</div>
      <ul class="nav-links">
        <li><a href="#home">Ana Sayfa</a></li>
        <li><a href="#about">Hakkımızda</a></li>
        <li><a href="#projects">Projeler</a></li>
        <li><a href="#contact">İletişim</a></li>
      </ul>
      <div class="burger">
        <div class="line1"></div>
        <div class="line2"></div>
        <div class="line3"></div>
      </div>
    </div>
  </nav>

  <!-- Hero -->
  <header id="home" class="hero">
    <div class="hero-content">
      <h1>Hoş Geldiniz</h1>
      <p>Hamburger menülü ve etkileşimli site.</p>
      <button id="bg-toggle" class="btn">Arka Planı Değiştir</button>
    </div>
  </header>

  <!-- About -->
  <section id="about" class="section">
    <h2>Hakkımızda</h2>
    <p>Bu site örnek olarak hazırlanmıştır.</p>
  </section>

  <!-- Projects -->
  <section id="projects" class="section">
    <h2>Projeler</h2>
    <div class="project-card">
      <h3>Proje 1</h3>
      <p>Basit bir proje açıklaması.</p>
    </div>
    <div class="project-card">
      <h3>Proje 2</h3>
      <p>Başka bir proje açıklaması.</p>
    </div>
  </section>

  <!-- Contact -->
  <section id="contact" class="section">
    <h2>İletişim</h2>
    <form id="contact-form">
      <input type="text" placeholder="Adınız" required>
      <input type="email" placeholder="E-posta" required>
      <textarea placeholder="Mesajınız" required></textarea>
      <button type="submit" class="btn">Gönder</button>
    </form>
  </section>

  <script src="app.js"></script>
</body>
</html>
